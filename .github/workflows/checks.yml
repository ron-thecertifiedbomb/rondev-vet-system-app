name: Lite Checks

on:
  pull_request:
    branches:
      - master

  push:
    branches:
      - master

jobs:
  checks:
    name: Typecheck and log checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Check no direct console usage
        run: npm run check:no-console